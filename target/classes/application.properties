# ===============================
# Configuraïŋ―ïŋ―o do Banco de Dados
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/reusemi_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# Configuraïŋ―ïŋ―o do JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MariaDB (ou MySQL se preferir)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Tamanho mïŋ―ximo para upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Recursos estïŋ―ticos
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ===============================
# Configuraïŋ―ïŋ―o Extra
# ===============================
# Desativa scripts de inicializaïŋ―ïŋ―o automïŋ―ticos
spring.sql.init.mode=never

# Configuraïŋ―ïŋ―o do servidor Spring Boot
server.port=8080
spring.main.web-application-type=servlet
spring.main.allow-bean-definition-overriding=true

# Para evitar conflitos com o JavaFX
spring.javafx.enabled=false

# Configuraïŋ―ïŋ―o principal
spring.application.name=Reusemi

# Perfil ativo (pode ser sobrescrito por linha de comando)
spring.profiles.active=prod



# Logging
logging.level.com.reusemi=INFO
logging.file.name=logs/reusemi.log


# Configuraïŋ―ïŋ―o do Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# Configuraïŋ―ïŋ―o de recursos estïŋ―ticos
spring.mvc.static-path-pattern=/**
