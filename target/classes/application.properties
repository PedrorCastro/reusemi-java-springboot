# ==================== DATABASE CONFIGURATION ====================
spring.datasource.url=jdbc:mysql://localhost:3306/reusemi?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&nullNamePatternMatchesAll=true
spring.datasource.username=root
spring.datasource.password=

# ==================== JPA / HIBERNATE ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Solu��o para Hibernate 6 + MySQL
spring.jpa.properties.hibernate.tool.schema.extract.auto=metadata
spring.jpa.properties.hibernate.id.sequence_style=auto
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Desabilita valida��o de sequences (causa o erro)
spring.jpa.properties.hibernate.tool.schema.validate=none

# ==================== SERVER CONFIGURATION ====================
server.port=8080
server.address=0.0.0.0

# ==================== THYMELEAF TEMPLATES ====================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# ==================== ERROR HANDLING ====================
server.error.whitelabel.enabled=false
server.error.include-exception=true
server.error.include-message=always

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================== LOGGING ====================
logging.level.com.reusemi=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG