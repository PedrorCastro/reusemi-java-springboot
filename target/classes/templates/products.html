<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Lista de Produtos</h1>

    <a href="/products/new" class="btn btn-primary mb-3">Adicionar Produto</a>

    <div class="row">
        <div th:each="product : ${products}" class="col-md-4 mb-3">
            <div class="card">
                <img th:if="${product.imageUrl}"
                     th:src="@{'/images/' + ${product.imageUrl}}"
                     class="card-img-top"
                     style="height: 200px; object-fit: cover;"
                     onerror="this.src='https://via.placeholder.com/300x200'">
                <div class="card-body">
                    <h5 th:text="${product.name}" class="card-title"></h5>
                    <p th:text="${product.description}" class="card-text"></p>
                       class="text-success fw-bold"></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
