<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8">
 <title>Perfil - REUSEMI</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar Premium -->
    <header class="navbar navbar-expand-lg">
      <div class="container">
          <a th:href="@{/}" class="navbar-brand">
              <span class="logo-icon">♻️</span>
              <span th:href="@{/}">REUSEMI</span>
          </a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
              <i class="bi bi-list"></i>
          </button>

          <nav class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav ms-auto">
                  <li class="nav-item">
                      <a th:href="@{/}" class="nav-link active">
                          <i class="bi bi-house-door"></i> Início
                      </a>
                  </li>
                  <li class="nav-item">
                      <a th:href="@{/categorias}" class="nav-link">
                          <i class="bi bi-tags"></i> Categorias
                      </a>
                  </li>
                  <li class="nav-item dropdown">
                      <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                          <i class="bi bi-person-circle"></i> Minha Conta
                      </a>
                      <ul class="dropdown-menu">
                          <li><a class="dropdown-item" th:href="@{/perfil}">Meu Perfil</a></li>
                          <li><hr class="dropdown-divider"></li>
                          <li><a class="dropdown-item" th:href="@{/logout}">Sair</a></li>
                          <li><a class="dropdown-item text-warning" th:href="@{/admin}">Área Admin</a></li>
                      </ul>
                  </li>
                  <li class="nav-item">
                      <a th:href="@{/login}" class="nav-link">
                          <i class="bi bi-box-arrow-in-right"></i> Entrar
                      </a>
                  </li>
                  <li class="nav-item">
                      <a th:href="@{/cadastro}" class="nav-link btn btn-outline-primary ms-2">
                          <i class="bi bi-person-plus"></i> Cadastrar
                      </a>
                  </li>
              </ul>
          </nav>
      </div>
    </header>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Fecha o menu mobile ao clicar em um item
document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', () => {
    const navbar = document.querySelector('.navbar-collapse');
    if (navbar.classList.contains('show')) {
      navbar.classList.remove('show');
    }
  });
});
</script>
  
  <section class="hero">
    <div class="container">
      <h2>Bem-vindo, Usuário</h2>
      <div class="card">
        <div class="card-body">
          <h3 class="card-title">Dados do Usuário</h3>
          <p class="card-text"><strong>Nome:</strong> Usuário Exemplo</p>
          <p class="card-text"><strong>Email:</strong> usuario@exemplo.com</p>
          <p class="card-text"><strong>Nível:</strong> usuário</p>
          <a href="admin.html" class="btn btn-outline-primary">Área Administrativa</a>
        </div>
      </div>
    </div>
  </section>
  
  <footer>
    <div class="container">
      <p>&copy; 2025 REUSEMI</p>
    </div>
  </footer>
</body>
</html>
