# ===============================
# Configuração do Banco de Dados
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/reusemi_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# Configuração do JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MariaDB (ou MySQL se preferir)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Tamanho máximo para upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Recursos estáticos
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ===============================
# Configuração Extra
# ===============================
# Desativa scripts de inicialização automáticos
spring.sql.init.mode=never

# Configuração do servidor Spring Boot
server.port=8080
spring.main.web-application-type=servlet
spring.main.allow-bean-definition-overriding=true

# Para evitar conflitos com o JavaFX
spring.javafx.enabled=false

# Configuração principal
spring.application.name=Reusemi

# Perfil ativo (pode ser sobrescrito por linha de comando)
spring.profiles.active=prod



# Logging
logging.level.com.reusemi=INFO
logging.file.name=logs/reusemi.log


# Configuração do Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# Configuração de recursos estáticos
spring.mvc.static-path-pattern=/**
