# ===============================
# Configuraçăo do Banco de Dados
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/reusemi_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# Configuraçăo do JPA / Hibernate
# ===============================
# ? FORÇAR recriaçăo completa das tabelas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ? REMOVA a linha do dialect (deixe o Spring Boot detectar automaticamente)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Configuraçăo de Upload/Recursos
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ===============================
# Configuraçăo do Thymeleaf
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# ===============================
# Logging
# ===============================
logging.level.com.reusemi=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.name=logs/reusemi.log

# ===============================
# Configuraçăo Principal
# ===============================
spring.application.name=Reusemi
server.port=8080
spring.profiles.active=dev